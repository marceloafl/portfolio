<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcelo Lemes</title>
    <link rel="stylesheet" href="assets/css/base/reset.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,300;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="assets/css/base/base.css">
    <link rel="stylesheet" href="assets/css/base/variables.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/about.css">
    <link rel="stylesheet" href="assets/css/skills.css">
    <link rel="stylesheet" href="assets/css/projects.css">
    <link rel="stylesheet" href="assets/css/footer.css">
    <link rel="stylesheet" href="assets/css/tabbar.css">
</head>
<body>
    <header class="header">
        <a href="index.html" target="_self" class="logo__link">
            <h1 class="logo-title">Marcelo Lemes</h1>
            <h2 class="logo-subtitle">Desenvolvedor Front-end</h2>
        </a>
        <ul class="menu-nav menu-nav--header">
            <li class="menu__item"><a href="projects/index.html" target="_self" class="menu__item-link">Projetos</a></li>
            <li class="menu__item"><a href="#" class="menu__item-link">Sobre</a></li>
            <li class="menu__item"><a href="#contact" class="menu__item-link">Contato</a></li>
        </ul>
        <ul class="menu-social--header">
            <li class="menu__item">
                <a href="https://github.com/marceloafl" target="_blank" class="item__link">
                    <img src="assets/images/icons/GitHub-Mark-Light-32px.png" alt="Ir para o GitHub" class="item__image">
                </a>
            </li>
            <li class="menu__item">
                <a href="https://www.linkedin.com/in/marceloafl/" target="_blank" class="item__link"><img src="assets/images/icons/linkedin-white-32px.png" alt="Ir para o LinkedIn" class="item__image">
                </a>
            </li>    
        </ul>
    </header>
    <main class="main">
        <section class="about" data-about="wrapper">
            <section class="about-image__wrapper" data-about="image-wrapper">
                <img src="assets/images/profile-image/marcelo.png" alt="Marcelo Lemes" class="about-photo" data-about="image">
            </section>
            <section class="about-text__wrapper">
                <section class="about-text__wrapper--info">
                    <h2 class="about-title">
                        <span class="about-title__decoration--left material-symbols-outlined"></span>
                        Front-end
                        <span class="about-title__decoration--right material-symbols-outlined"></span>
                    </h2>
                    <p class="about-description description--hide" data-about="description">Desenvolvo sites visualmente agradáveis e com a melhor usabilidade possível.</p>
                </section>
                <a href="projects/index.html" target="_self" class="about-button invisible" data-about="button">Ver projetos<spam class="about-button-icon material-symbols-outlined"></spam></a>
            </section>
        </section>
        <section class="skills">
            <h3 class="section-title">Skills</h3>
            <section class="skills-slider" data-section="skills">
                <button class="skills__arrows arrow--left material-symbols-outlined" data-arrow="left"></button>
                <ul class="skill-list" data-skills="list"></ul>
                <button class="skills__arrows arrow--right material-symbols-outlined" data-arrow="right"></button>
            </section>
        </section>
        <section class="projects">
            <h3 class="section-title">Projetos</h3>
            <ul class="projects-wrapper" data-projects="list">                               
            </ul>            
            <a href="projects/index.html" target="_self" class="projects-button">Ver todos os projetos
                <spam class="projects-button-icon material-symbols-outlined"></spam>
            </a>
        </section>
        <aside class="tabbar">
            <a href="#" target="_self" class="tabbar-item-wrapper">
                <button class="tabbar__item tabbar__item--active tabbar__item--home material-symbols-outlined"></button>
            </a>
            <a href="./projects/index.html" target="_self" class="tabbar-item-wrapper">
                <button class="tabbar__item tabbar__item--projects material-symbols-outlined"></button>
            </a>
            <!-- <a class="tabbar-item-wrapper">
                <button class="tabbar__item tabbar__item--contact material-symbols-outlined"></button>
            </a> -->
        </aside>
    </main>
    <footer class="footer">
        <section id="contact" class="footer__contact-wrapper">
            <ul class="menu-social--footer">
                <li class="menu__item--footer">
                    <a href="https://github.com/marceloafl" target="_blank" class="item__link">
                        <img src="assets/images/icons/GitHub-Mark-Light-32px.png" alt="Ir para o GitHub" class="item__image" data-image="github">
                    </a>
                </li>
                <li class="menu__item--footer">
                    <a href="https://www.linkedin.com/in/marceloafl/" target="_blank" class="item__link"><img src="assets/images/icons/linkedin-white-32px.png" alt="Ir para o LinkedIn" class="item__image" data-image="linkedin">
                    </a>
                </li>    
            </ul>
            <p class="contact--email">marceloaflemes@gmail.com</p>
        </section>
        <p class="copyrigth">Criado por Marcelo Lemes | 2022</p>
    </footer><script src="main.js" type="module"></script>    
</body>
</html>
